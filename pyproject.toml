[tool.black]
line-length = 110
include = '(\.py|^/test/check-.*|^/test/files/mock-insights)$'

[tool.mypy]
scripts_are_modules = true  # allow checking all scripts in one invocation
explicit_package_bases = true
# TODO: remove this when adding mypy config from other cockpit projects
ignore_missing_imports = true

[tool.pyright]
strict = ["**"]
extraPaths = ["test/common", "bots"]

[tool.ruff]
exclude = [
    ".git/",
    "modules/",
    "node_modules/",
]
line-length = 118
preview = true
src = []

[tool.ruff.lint]
select = [
    "A",       # flake8-builtins
    "B",       # flake8-bugbear
    "C4",      # flake8-comprehensions
    "D300",    # pydocstyle: Forbid ''' in docstrings
    "DTZ",     # flake8-datetimez
    "E",       # pycodestyle
    "EXE",     # flake8-executable
    "F",       # pyflakes
    "FBT",     # flake8-boolean-trap
    "G",       # flake8-logging-format
    "I",       # isort
    "ICN",     # flake8-import-conventions
    "ISC",     # flake8-implicit-str-concat
    "PLE",     # pylint errors
    "PGH",     # pygrep-hooks
    "RSE",     # flake8-raise
    "RUF",     # ruff rules
    "T10",     # flake8-debugger
    "TC",      # flake8-type-checking
    "UP032",   # f-string
    "W",       # warnings (mostly whitespace)
    "YTT",     # flake8-2020
]

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.vulture]
# TODO: fix vulture config when fixing python static checks
exclude = [ "**" ]

[tool.codespell]
skip = './node_modules,./dist'
ignore-words-list = 'doubleclick'
